<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 랭킹 클릭커 게임!</title>
    
    <!-- Supabase 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #1e1e2e;
            color: #ffffff;
            text-align: center;
            display: flex;
            flex-direction: row; /* 좌우 분할 */
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            gap: 50px;
            overflow: hidden;
            position: relative;
        }  
        
        /* 왼쪽 게임 화면 영역 */
        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            width: 400px;
        }
        
        /* 오른쪽 랭킹 보드 영역 */
        .ranking-area {
            width: 300px;
            background-color: #252636;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #45475a;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3 );
            display: flex;
            flex-direction: column;
            height: 450px;
        }
        
        h1 { color: #f9e2af; margin-bottom: 10px; }
        h2 { color: #a6e3a1; margin-top: 0; margin-bottom: 15px; }
        .score { font-size: 2rem; margin-bottom: 10px; transition: color 0.3s; }
        
        /* 피버 게이지 */
        #fever-container {
            width: 100%;
            height: 12px;
            background: #313244;
            border-radius: 6px;
            margin: 10px 0 20px 0;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }
        #fever-bar {
            width: 0%;
            height: 100%;
            background: #fab387;
            transition: width 0.1s, background-color 0.3s;
        }

        /* 코인(동전) 스타일 */
        .coin {
            font-size: 6rem;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
            margin: 20px 0;
        }
        .coin:hover { transform: scale(1.1); }
        .coin:active { transform: scale(0.9); }
        
        /* 버튼 그리드 레이아웃 (정돈된 UI) */
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 400px;
        }
        
        .full-width {
            grid-column: span 2;
        }
        
        .btn {
            padding: 12px;
            font-size: 0.9rem;
            background-color: #a6e3a1;
            color: #11111b;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn:disabled {
            background-color: #585b70;
            color: #a6adc8;
            cursor: not-allowed;
        }

        /* 버튼 위치 편집 기능 */
        .layout-editor {
            position: fixed;
            right: 20px;
            bottom: 20px;
            z-index: 900;
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 8px;
            width: min(360px, calc(100vw - 40px));
            padding: 10px;
            border: 1px solid #45475a;
            border-radius: 12px;
            background: rgba(37, 38, 54, 0.96);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
        }
        .layout-editor button {
            padding: 9px 12px;
            border: none;
            border-radius: 7px;
            font-weight: bold;
            cursor: pointer;
        }
        #layout-edit-btn { background: #89b4fa; color: #11111b; }
        #layout-save-btn { background: #a6e3a1; color: #11111b; }
        #layout-reset-btn { background: #f38ba8; color: #11111b; }
        .layout-help {
            flex-basis: 100%;
            margin: 0;
            color: #cdd6f4;
            font-size: 0.78rem;
            line-height: 1.4;
        }
        .layout-editor.editing {
            outline: 2px solid #f9e2af;
        }
        .btn-group.custom-layout {
            position: relative;
            display: block;
            min-height: 210px;
        }
        .btn-group.custom-layout > .btn {
            position: absolute;
            margin: 0;
            touch-action: none;
        }
        .btn-group.editing-layout {
            outline: 2px dashed #f9e2af;
            outline-offset: 8px;
            background: rgba(249, 226, 175, 0.05);
        }
        .btn-group.editing-layout > .btn {
            cursor: grab;
            user-select: none;
        }
        .btn-group.editing-layout > .btn:active { cursor: grabbing; }
        .btn-group.editing-layout > .btn::after {
            content: ' 이동';
            opacity: 0.6;
            font-size: 0.72rem;
        }
        
        .reset-btn { background-color: #f38ba8; }
        
        /* 랭킹 리스트 */
        .rank-list {
            list-style: none;
            padding: 0; margin: 0;
            text-align: left;
            overflow-y: auto;
            flex-grow: 1;
        }
        .rank-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #313244;
            font-size: 0.95rem;
        }
        .rank-item:last-child { border: none; }
        .rank-num { font-weight: bold; color: #f9e2af; margin-right: 10px; }

        /* 클릭 시 +1 애니메이션 */
        .floating-text {
            position: absolute;
            font-size: 1.5rem;
            font-weight: bold;
            color: #f9e2af;
            pointer-events: none;
            user-select: none;
            animation: floatUp 0.8s ease-out forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-80px); opacity: 0; }
        }

        /* 로그인 / 오버레이 UI */
        .auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(17, 17, 27, 0.95);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 0.3s ease;
        }
        .auth-box {
            background-color: #252636; padding: 40px; border-radius: 16px;
            border: 2px solid #45475a; width: 320px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); text-align: center;
        }
        .auth-box h2 { color: #f9e2af; margin-bottom: 20px; }
        .auth-input {
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px;
            border: 1px solid #45475a; background-color: #1e1e2e; color: #ffffff;
            box-sizing: border-box; font-size: 0.95rem;
        }
        .auth-btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .auth-btn { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .login-btn { background-color: #a6e3a1; color: #11111b; }
        .signup-btn { background-color: #89b4fa; color: #11111b; }
        
        /* 상단 유저 뱃지 */
        .user-badge {
            position: absolute; top: 20px; left: 20px; background-color: #252636;
            padding: 10px 20px; border-radius: 20px; border: 1px solid #45475a;
            font-size: 0.85rem; display: flex; align-items: center; gap: 15px;
        }
        .user-badge button { background: none; border: none; cursor: pointer; font-weight: bold; font-size: 0.85rem; padding: 0; }
        .logout-btn { color: #f9e2af; }
        .delete-account-btn { color: #f38ba8; }
        .user-badge button:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <!-- 🔒 로그인 모달 -->
    <div class="auth-overlay" id="auth-overlay">
        <div class="auth-box">
            <h2>🪙 로그인 필수!</h2>
            <p style="color: #a6adc8; font-size: 0.85rem; margin-bottom: 20px;">데이터 저장과 랭킹 등록을 위해 계정이 필요합니다.</p>
            <input type="email" id="auth-email" class="auth-input" placeholder="이메일 입력 (예: test@test.com)">
            <input type="password" id="auth-password" class="auth-input" placeholder="비밀번호 입력">
            <input type="text" id="auth-nickname" class="auth-input" placeholder="사용할 닉네임 (가입 시만)">
            <div class="auth-btn-group">
                <button class="auth-btn signup-btn" id="btn-signup">회원가입</button>
                <button class="auth-btn login-btn" id="btn-login">로그인</button>
            </div>
        </div>
    </div>

    <!-- 👤 유저 정보 -->
    <div class="user-badge" id="user-badge" style="display: none;">
        <span>👤 <span id="user-name">로딩 중..</span></span>
        <button class="logout-btn" id="btn-logout">로그아웃</button>
        <span style="color: #45475a;">|</span>
        <button class="delete-account-btn" id="btn-delete-account">회원탈퇴</button>
    </div>

    <!-- 🎮 왼쪽: 게임 플레이 화면 -->
    <div class="game-area">
        <h1>골드 클릭커 🪙</h1>
        <div class="score">골드: <span id="gold">0</span></div>
        <div id="pps" style="color: #a6adc8; font-size: 0.9rem; margin-bottom: 10px;">초당 수익: 0 골드</div>
        
        <!-- 피버 게이지 -->
        <div id="fever-container">
            <div id="fever-bar"></div>
        </div>
        
        <div class="coin" id="coin">🪙</div>
        
        <!-- 버튼 패널 -->
        <div class="btn-group">
            <button class="btn" id="upgrade-click-btn" disabled>클릭 효율 강화</button>
            <button class="btn" id="upgrade-auto-btn" disabled>광부 고용</button>
            <button class="btn full-width" id="rank-submit-btn">🏆 실시간 랭킹 강제 업데이트</button>
            <button class="btn reset-btn full-width" id="reset-btn">내 로컬 저장소 지우기 🔄</button>
        </div>
    </div>

    <!-- 버튼 위치 편집 도구 -->
    <div class="layout-editor" id="layout-editor">
        <button type="button" id="layout-edit-btn">버튼 위치 편집</button>
        <button type="button" id="layout-save-btn" hidden>위치 저장</button>
        <button type="button" id="layout-reset-btn">위치 초기화</button>
        <p class="layout-help" id="layout-help">편집을 누른 뒤 게임 버튼을 마우스나 손가락으로 끌어 이동하세요.</p>
    </div>

    <!-- 🏆 오른쪽: 실시간 랭킹 보드 -->
    <div class="ranking-area">
        <h2>실시간 랭킹 Top 10</h2>
        <ul class="rank-list" id="rank-list">
            <li class="rank-item">로딩 중.</li>
        </ul>
    </div>

    <script>
        // Supabase 설정
        const SUPABASE_URL = 'https://gjlxtesbxbleztwpwtuz.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_7PD8EWIWx5jTs4kiOzQLhw_BMENjc85';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY );

        // 게임 변수
        let gold = 0;
        let autoMiners = 0;
        let autoUpgradeCost = 10;
        let clickPower = 1;
        let clickUpgradeCost = 50;
        
        // 피버 변수
        let feverGauge = 0;
        let isFever = false;
        const MAX_FEVER = 100;

        let currentUser = null;
        let userNickname = "";

        // DOM 요소
        const goldEl = document.getElementById('gold');
        const coinEl = document.getElementById('coin');
        const clickUpgradeBtn = document.getElementById('upgrade-click-btn');
        const autoUpgradeBtn = document.getElementById('upgrade-auto-btn');
        const feverBar = document.getElementById('fever-bar');
        const rankListEl = document.getElementById('rank-list');
        const rankSubmitBtn = document.getElementById('rank-submit-btn');
        
        const authOverlay = document.getElementById('auth-overlay');
        const userBadge = document.getElementById('user-badge');

        // 버튼 위치 편집 요소
        const buttonGroup = document.querySelector('.btn-group');
        const movableButtons = [...buttonGroup.querySelectorAll(':scope > .btn')];
        const layoutEditor = document.getElementById('layout-editor');
        const layoutEditBtn = document.getElementById('layout-edit-btn');
        const layoutSaveBtn = document.getElementById('layout-save-btn');
        const layoutResetBtn = document.getElementById('layout-reset-btn');
        const layoutHelp = document.getElementById('layout-help');
        const BUTTON_LAYOUT_KEY = 'clicker_button_layout_v1';
        let isEditingLayout = false;
        let draggedButton = null;
        let dragOffsetX = 0;
        let dragOffsetY = 0;
        let didDrag = false;

        /* ---------------- [ 버튼 위치 직접 편집 ] ---------------- */

        function freezeCurrentButtonLayout() {
            const groupRect = buttonGroup.getBoundingClientRect();
            const positions = movableButtons.map((button) => {
                const rect = button.getBoundingClientRect();
                return {
                    button,
                    left: rect.left - groupRect.left,
                    top: rect.top - groupRect.top,
                    width: rect.width,
                    height: rect.height
                };
            });

            const neededHeight = Math.max(
                buttonGroup.offsetHeight,
                ...positions.map(({ top, height }) => top + height)
            );

            buttonGroup.classList.add('custom-layout');
            buttonGroup.style.height = `${Math.ceil(neededHeight)}px`;

            positions.forEach(({ button, left, top, width }) => {
                button.style.left = `${left}px`;
                button.style.top = `${top}px`;
                button.style.width = `${width}px`;
            });
        }

        function getButtonLayout() {
            return {
                groupHeight: buttonGroup.offsetHeight,
                buttons: movableButtons.map((button) => ({
                    id: button.id,
                    xRatio: parseFloat(button.style.left || 0) / Math.max(buttonGroup.clientWidth, 1),
                    top: parseFloat(button.style.top || 0),
                    widthRatio: button.offsetWidth / Math.max(buttonGroup.clientWidth, 1)
                }))
            };
        }

        function applyButtonLayout(layout) {
            if (!layout || !Array.isArray(layout.buttons)) return false;

            buttonGroup.classList.add('custom-layout');
            buttonGroup.style.height = `${Math.max(Number(layout.groupHeight) || 210, 120)}px`;

            layout.buttons.forEach((item) => {
                const button = document.getElementById(item.id);
                if (!button || !buttonGroup.contains(button)) return;

                const groupWidth = Math.max(buttonGroup.clientWidth, 1);
                const width = Math.min(
                    Math.max((Number(item.widthRatio) || 0.48) * groupWidth, 110),
                    groupWidth
                );
                const left = Math.min(
                    Math.max((Number(item.xRatio) || 0) * groupWidth, 0),
                    Math.max(groupWidth - width, 0)
                );

                button.style.width = `${width}px`;
                button.style.left = `${left}px`;
                button.style.top = `${Math.max(Number(item.top) || 0, 0)}px`;
            });
            return true;
        }

        function loadButtonLayout() {
            try {
                const saved = JSON.parse(localStorage.getItem(BUTTON_LAYOUT_KEY));
                applyButtonLayout(saved);
            } catch (error) {
                console.warn('저장된 버튼 위치를 불러오지 못했습니다.', error);
                localStorage.removeItem(BUTTON_LAYOUT_KEY);
            }
        }

        function setLayoutEditing(enabled) {
            isEditingLayout = enabled;
            layoutEditor.classList.toggle('editing', enabled);
            buttonGroup.classList.toggle('editing-layout', enabled);
            layoutEditBtn.hidden = enabled;
            layoutSaveBtn.hidden = !enabled;
            layoutHelp.textContent = enabled
                ? '게임 버튼을 원하는 위치로 끌어 놓은 뒤 “위치 저장”을 누르세요.'
                : '편집을 누른 뒤 게임 버튼을 마우스나 손가락으로 끌어 이동하세요.';

            if (enabled && !buttonGroup.classList.contains('custom-layout')) {
                freezeCurrentButtonLayout();
            }
        }

        function moveDraggedButton(clientX, clientY) {
            if (!draggedButton) return;
            const groupRect = buttonGroup.getBoundingClientRect();
            const maxLeft = Math.max(buttonGroup.clientWidth - draggedButton.offsetWidth, 0);
            const maxTop = Math.max(buttonGroup.clientHeight - draggedButton.offsetHeight, 0);
            const left = Math.min(Math.max(clientX - groupRect.left - dragOffsetX, 0), maxLeft);
            const top = Math.min(Math.max(clientY - groupRect.top - dragOffsetY, 0), maxTop);

            draggedButton.style.left = `${left}px`;
            draggedButton.style.top = `${top}px`;
            didDrag = true;
        }

        movableButtons.forEach((button) => {
            button.addEventListener('pointerdown', (event) => {
                if (!isEditingLayout) return;
                event.preventDefault();
                event.stopPropagation();

                const rect = button.getBoundingClientRect();
                draggedButton = button;
                dragOffsetX = event.clientX - rect.left;
                dragOffsetY = event.clientY - rect.top;
                didDrag = false;
                button.setPointerCapture(event.pointerId);
            });

            button.addEventListener('pointermove', (event) => {
                if (!isEditingLayout || draggedButton !== button) return;
                moveDraggedButton(event.clientX, event.clientY);
            });

            button.addEventListener('pointerup', (event) => {
                if (draggedButton !== button) return;
                if (button.hasPointerCapture(event.pointerId)) button.releasePointerCapture(event.pointerId);
                draggedButton = null;
            });

            // 편집 중에는 원래 게임 버튼 기능이 실행되지 않도록 차단합니다.
            button.addEventListener('click', (event) => {
                if (!isEditingLayout) return;
                event.preventDefault();
                event.stopImmediatePropagation();
            }, true);
        });

        layoutEditBtn.addEventListener('click', () => setLayoutEditing(true));

        layoutSaveBtn.addEventListener('click', () => {
            localStorage.setItem(BUTTON_LAYOUT_KEY, JSON.stringify(getButtonLayout()));
            setLayoutEditing(false);
            layoutHelp.textContent = '버튼 위치가 이 브라우저에 저장되었습니다.';
        });

        layoutResetBtn.addEventListener('click', () => {
            if (!confirm('버튼 위치를 처음 상태로 되돌릴까요?')) return;
            localStorage.removeItem(BUTTON_LAYOUT_KEY);
            setLayoutEditing(false);
            buttonGroup.classList.remove('custom-layout', 'editing-layout');
            buttonGroup.style.height = '';
            movableButtons.forEach((button) => {
                button.style.left = '';
                button.style.top = '';
                button.style.width = '';
            });
            layoutHelp.textContent = '버튼 위치가 기본 배열로 초기화되었습니다.';
        });

        window.addEventListener('resize', () => {
            if (isEditingLayout || !buttonGroup.classList.contains('custom-layout')) return;
            try {
                applyButtonLayout(JSON.parse(localStorage.getItem(BUTTON_LAYOUT_KEY)));
            } catch (error) {
                console.warn('화면 크기 변경 후 버튼 위치 조정에 실패했습니다.', error);
            }
        });

        loadButtonLayout();

        /* ---------------- [ 게임 로드 및 저장 ] ---------------- */
        
        async function loadGame(user ) {
            currentUser = user;
            userNickname = user.user_metadata.nickname || " 이름없음 ";
            
            document.getElementById('user-name').textContent = userNickname;
            userBadge.style.display = "flex";
            authOverlay.style.opacity = 0;
            setTimeout(() => { authOverlay.style.display = "none"; }, 300);

            // 로컬 데이터 로드
            gold = parseInt(localStorage.getItem(`clicker_${user.id}_gold`)) || 0;
            autoMiners = parseInt(localStorage.getItem(`clicker_${user.id}_miners`)) || 0;
            autoUpgradeCost = parseInt(localStorage.getItem(`clicker_${user.id}_autoCost`)) || 10;
            clickPower = parseInt(localStorage.getItem(`clicker_${user.id}_clickPower`)) || 1;
            clickUpgradeCost = parseInt(localStorage.getItem(`clicker_${user.id}_clickCost`)) || 50;
            
            updateDisplay();
            getRankings();
            syncMyScoreToDatabase();
        }

        function unloadGame() {
            currentUser = null;
            userBadge.style.display = "none";
            authOverlay.style.display = "flex";
            authOverlay.style.opacity = 1;
            gold = autoMiners = feverGauge = 0;
            clickPower = 1; autoUpgradeCost = 10; clickUpgradeCost = 50;
            updateDisplay();
        }

        function saveGame() {
            if (!currentUser) return;
            localStorage.setItem(`clicker_${currentUser.id}_gold`, gold);
            localStorage.setItem(`clicker_${currentUser.id}_miners`, autoMiners);
            localStorage.setItem(`clicker_${currentUser.id}_autoCost`, autoUpgradeCost);
            localStorage.setItem(`clicker_${currentUser.id}_clickPower`, clickPower);
            localStorage.setItem(`clicker_${currentUser.id}_clickCost`, clickUpgradeCost);
        }

        /* ---------------- [ UI 업데이트 ] ---------------- */

        // 기존 updateDisplay 함수를 아래 내용으로 교체하세요
        function updateDisplay() {
            goldEl.textContent = Math.floor(gold).toLocaleString();
            goldEl.style.color = isFever ? "#f38ba8" : "#f9e2af";

            // [추가] 초당 수익 계산 및 표시
            // 클릭 효율(clickPower)은 초당 수익에 포함하지 않고, 자동 생산량(autoMiners)만 계산
            const pps = autoMiners; 
            document.getElementById('pps').textContent = `초당 수익: ${pps.toLocaleString()} 골드`;

            // 클릭 버튼 업데이트
            clickUpgradeBtn.textContent = `클릭 강화 (비용: ${clickUpgradeCost.toLocaleString()}) | +${clickPower}`;
            clickUpgradeBtn.disabled = gold < clickUpgradeCost;

            // 광부 버튼 업데이트
            autoUpgradeBtn.textContent = `광부 고용 (비용: ${autoUpgradeCost.toLocaleString()}) | ${autoMiners}명`;
            autoUpgradeBtn.disabled = gold < autoUpgradeCost;
        }

        function updateFeverBar() {
            const percent = (feverGauge / MAX_FEVER) * 100;
            feverBar.style.width = percent + "%";
        }

        function startFever() {
            isFever = true;
            feverGauge = 0;
            feverBar.style.background = "#f38ba8";
            
            setTimeout(() => {
                isFever = false;
                feverBar.style.background = "#fab387";
                updateFeverBar();
                updateDisplay();
            }, 10000); // 10초간 지속
        }

        /* ---------------- [ 상호작용 (이벤트) ] ---------------- */

        // 메인 클릭 이벤트
        coinEl.addEventListener('click', (event) => {
            if (!currentUser) return;
            
            let gain = isFever ? clickPower * 5 : clickPower;
            gold += gain;
            
            // 피버 로직
            if (!isFever) {
                feverGauge += 1;
                updateFeverBar();
                if (feverGauge >= MAX_FEVER) startFever();
            }
            
            createFloatingText(event.clientX, event.clientY, `+${gain}`);
            saveGame();
            updateDisplay();
        });

        // 둥둥 뜨는 텍스트
        function createFloatingText(x, y, textStr) {
            const text = document.createElement('div');
            text.classList.add('floating-text');
            text.textContent = textStr;
            text.style.color = isFever ? "#f38ba8" : "#f9e2af"; // 피버 시 붉은색
            text.style.left = `${x - 15}px`;
            text.style.top = `${y - 15}px`;
            document.body.appendChild(text);
            setTimeout(() => { text.remove(); }, 800);
        }

        // 클릭 강화 버튼
        clickUpgradeBtn.addEventListener('click', () => {
            if (gold >= clickUpgradeCost) {
                gold -= clickUpgradeCost;
                clickPower *= 2;
                clickUpgradeCost = Math.floor(clickUpgradeCost * 2.5);
                saveGame(); updateDisplay(); syncMyScoreToDatabase();
            }
        });

        // 자동 광부 버튼
        autoUpgradeBtn.addEventListener('click', () => {
            if (gold >= autoUpgradeCost) {
                gold -= autoUpgradeCost;
                autoMiners++;
                autoUpgradeCost = Math.floor(autoUpgradeCost * 1.5);
                saveGame(); updateDisplay(); syncMyScoreToDatabase();
            }
        });

        // 초기화 버튼
        document.getElementById('reset-btn').addEventListener('click', () => {
            if (!currentUser) return;
            if (confirm("정말로 내 컴퓨터의 로컬 데이터만 초기화하시겠습니까?")) {
                gold = autoMiners = feverGauge = 0;
                clickPower = 1; autoUpgradeCost = 10; clickUpgradeCost = 50;
                saveGame(); updateDisplay(); updateFeverBar();
            }
        });

        // 자동 수익 인터벌 (1초마다)
        setInterval(() => {
            if (autoMiners > 0 && currentUser) {
                gold += autoMiners;
                saveGame(); updateDisplay();
            }
        }, 1000);

        /* ---------------- [ 랭킹 시스템 ] ---------------- */

        async function syncMyScoreToDatabase() {
            if (!currentUser) return;
            try {
                const { data } = await supabaseClient.from('rankings').select('score').eq('name', userNickname).single();
                if (data) {
                    if (gold > data.score) {
                        await supabaseClient.from('rankings').update({ score: gold }).eq('name', userNickname);
                    } else {
                        gold = data.score; saveGame(); updateDisplay();
                    }
                } else {
                    await supabaseClient.from('rankings').insert([{ name: userNickname, score: gold }]);
                }
                getRankings();
            } catch (err) { console.error("동기화 실패:", err); }
        }

        async function getRankings() {
            try {
                const { data, error } = await supabaseClient.from('rankings').select('name, score').order('score', { ascending: false }).limit(10);
                if (error) throw error;
                rankListEl.innerHTML = '';
                if (!data || data.length === 0) return rankListEl.innerHTML = '<li class="rank-item">등록된 랭커가 없습니다!</li>';
                
                data.forEach((item, index) => {
                    const li = document.createElement('li');
                    li.classList.add('rank-item');
                    li.innerHTML = `<span><span class="rank-num">${index + 1}</span>${item.name}</span> <span>${item.score.toLocaleString()} 골드</span>`;
                    rankListEl.appendChild(li);
                });
            } catch (err) { console.error("랭킹 로드 실패:", err); }
        }

        rankSubmitBtn.addEventListener('click', async () => {
            rankSubmitBtn.disabled = true; rankSubmitBtn.textContent = '동기화 중...';
            await syncMyScoreToDatabase();
            rankSubmitBtn.disabled = false; rankSubmitBtn.textContent = '🏆 실시간 랭킹 강제 업데이트';
        });

        setInterval(() => { if (currentUser) syncMyScoreToDatabase(); }, 15000);

        /* ---------------- [ 인증 & 계정 관리 ] ---------------- */

        document.getElementById('btn-signup').addEventListener('click', async () => {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value.trim();
            const nickname = document.getElementById('auth-nickname').value.trim();
            if (!email || !password || !nickname) return alert("모든 정보를 입력하세요!");
            
            const { error } = await supabaseClient.auth.signUp({ email, password, options: { data: { nickname } }});
            if (error) alert("가입 실패: " + error.message);
            else alert("회원가입 완료! 로그인 해주세요.");
        });

        document.getElementById('btn-login').addEventListener('click', async () => {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value.trim();
            if (!email || !password) return alert("이메일과 비밀번호를 입력하세요!");
            
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) alert("로그인 실패: " + error.message);
            else loadGame(data.user);
        });

        document.getElementById('btn-logout').addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            unloadGame();
            alert("로그아웃 되었습니다.");
        });

        document.getElementById('btn-delete-account').addEventListener('click', async () => {
            if (!confirm("정말 탈퇴하시겠습니까? 기록이 복구되지 않습니다.") || !confirm("마지막 확인입니다. 진행할까요?")) return;
            try {
                await supabaseClient.from('rankings').delete().eq('name', userNickname);
                
                localStorage.removeItem(`clicker_${currentUser.id}_gold`);
                localStorage.removeItem(`clicker_${currentUser.id}_miners`);
                localStorage.removeItem(`clicker_${currentUser.id}_autoCost`);
                localStorage.removeItem(`clicker_${currentUser.id}_clickPower`);
                localStorage.removeItem(`clicker_${currentUser.id}_clickCost`);

                await supabaseClient.auth.updateUser({ data: { deleted: true } });
                await supabaseClient.auth.signOut();
                unloadGame();
                getRankings();
                alert("회원 탈퇴 완료.");
            } catch (err) { alert("오류: " + err.message); }
        });

        // 앱 구동 시 자동 세션 확인
        supabaseClient.auth.getSession().then(({ data }) => {
            if (data.session) loadGame(data.session.user);
            else unloadGame();
        });

    </script>
</body>
</html>
