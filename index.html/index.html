<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 랭킹 클릭커 게임!</title>
    
    <!-- Supabase 데이터베이스 연결용 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #1e1e2e;
            color: #ffffff;
            text-align: center;
            display: flex;
            flex-direction: row; /* 화면을 좌우로 분할 */
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            gap: 50px;
            overflow: hidden;
            position: relative;
        }
        
        /* 왼쪽 게임 화면 영역 */
        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            width: 350px;
        }
        
        /* 오른쪽 랭킹 보드 영역 */
        .ranking-area {
            width: 300px;
            background-color: #252636;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #45475a;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        h1 { color: #f9e2af; margin-bottom: 10px; }
        h2 { color: #a6e3a1; margin-top: 0; }
        .score { font-size: 2rem; margin-bottom: 20px; }
        
        /* 코인(동전) 스타일 및 클릭 반응 */
        .coin {
            font-size: 6rem;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
        }
        .coin:hover { transform: scale(1.1); }
        .coin:active { transform: scale(0.9); }
        
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 30px;
            width: 100%;
        }
        
        .btn {
            padding: 12px 24px;
            font-size: 1rem;
            background-color: #a6e3a1;
            color: #11111b;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn:disabled {
            background-color: #585b70;
            color: #a6adc8;
            cursor: not-allowed;
        }
        
        .reset-btn { 
            background-color: #f38ba8; 
            color: #11111b; 
            font-size: 0.8rem; 
            padding: 6px 12px; 
            align-self: center;
        }
        
        /* 랭킹 리스트 스타일 */
        .rank-list {
            list-style: none;
            padding: 0;
            margin: 0;
            text-align: left;
        }
        .rank-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #313244;
            font-size: 0.95rem;
        }
        .rank-item:last-child { border: none; }
        .rank-num { font-weight: bold; color: #f9e2af; margin-right: 10px; }

        /* 클릭 시 둥둥 떠오르는 +1 효과 */
        .floating-text {
            position: absolute;
            font-size: 1.5rem;
            font-weight: bold;
            color: #f9e2af;
            pointer-events: none;
            user-select: none;
            animation: floatUp 0.8s ease-out forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-80px); opacity: 0; }
        }
        
        /* 배경 음악(BGM) 버튼 스타일 */
        .bgm-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #313244;
            color: #cdd6f4;
            border: 2px solid #45475a;
            padding: 8px 16px;
            font-size: 0.9rem;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            z-index: 100;
        }
    </style>
</head>
<body>

    <!-- 음악 ON/OFF 버튼 -->
    <button class="bgm-btn" id="bgm-toggle">🔇 음악 꺼짐</button>

    <!-- 왼쪽: 게임 플레이 화면 -->
    <div class="game-area">
        <h1>골드 클릭커 🪙</h1>
        <div class="score">골드: <span id="gold">0</span></div>
        <div class="coin" id="coin">🪙</div>
        
        <div class="btn-group">
            <button class="btn" id="upgrade-btn" disabled>자동 광부 고용 (비용: 10 골드)</button>
            <button class="btn" id="rank-submit-btn">🏆 내 점수 랭킹 등록하기</button>
            <button class="btn reset-btn" id="reset-btn">게임 초기화 🔄</button>
        </div>
    </div>

    <!-- 오른쪽: 실시간 랭킹 보드 -->
    <div class="ranking-area">
        <h2>실시간 랭킹 Top 10</h2>
        <ul class="rank-list" id="rank-list">
            <li class="rank-item">로딩 중...</li>
        </ul>
    </div>

    <script>
        // 🚨 여기에 내 실제 Supabase 프로젝트 정보를 넣어줘!
        const SUPABASE_URL = 'YOUR_SUPABASE_URL'; 
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let gold = 0;
        let autoMiners = 0;
        let upgradeCost = 10;

        const goldEl = document.getElementById('gold');
        const coinEl = document.getElementById('coin');
        const upgradeBtn = document.getElementById('upgrade-btn');
        const resetBtn = document.getElementById('reset-btn');
        const rankSubmitBtn = document.getElementById('rank-submit-btn');
        const rankListEl = document.getElementById('rank-list');
        const bgmToggleBtn = document.getElementById('bgm-toggle');

        // 사운드 파일 (믹스킷, 사운드이미지 제공 무료 리소스)
        const clickSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-84.wav');
        const bgm = new Audio('https://soundimage.org/wp-content/uploads/2016/10/Arcade-Fantasy.mp3');
        bgm.loop = true;
        bgm.volume = 0.4;
        let isMusicPlaying = false;

        // 게임 로드 함수 (새로고침 시 데이터 불러오기)
        function loadGame() {
            const savedGold = localStorage.getItem('clicker_gold');
            const savedMiners = localStorage.getItem('clicker_miners');
            const savedCost = localStorage.getItem('clicker_cost');
            
            if (savedGold !== null) gold = parseInt(savedGold);
            if (savedMiners !== null) autoMiners = parseInt(savedMiners);
            if (savedCost !== null) upgradeCost = parseInt(savedCost);
            
            updateDisplay();
            getRankings(); // 서버에서 최신 랭킹 데이터 가져오기
        }

        // 게임 진행 상황 로컬스토리지에 저장
        function saveGame() {
            localStorage.setItem('clicker_gold', gold);
            localStorage.setItem('clicker_miners', autoMiners);
            localStorage.setItem('clicker_cost', upgradeCost);
        }

        // Supabase 서버에서 상위 10명 랭킹 가져오기
        async function getRankings() {
            const { data, error } = await supabase
                .from('rankings')
                .select('name, score')
                .order('score', { ascending: false })
                .limit(10);

            if (error) {
                console.error("랭킹 로드 실패:", error);
                return;
            }

            rankListEl.innerHTML = '';
            if (data.length === 0) {
                rankListEl.innerHTML = '<li class="rank-item">아직 등록된 랭커가 없습니다!</li>';
                return;
            }

            data.forEach((item, index) => {
                const li = document.createElement('li');
                li.classList.add('rank-item');
                li.innerHTML = `
                    <span><span class="rank-num">${index + 1}</span>${item.name}</span>
                    <span>${item.score.toLocaleString()} 골드</span>
                `;
                rankListEl.appendChild(li);
            });
        }

        // 내 현재 골드 정보를 서버에 등록하기
        rankSubmitBtn.addEventListener('click', async () => {
            const playerName = prompt("랭킹판에 등록할 이름을 입력해 주세요 (최대 8자):");
            if (!playerName) return;
            if (playerName.length > 8) {
                alert("이름은 8자 이하로 입력해 주세요.");
                return;
            }

            rankSubmitBtn.disabled = true;
            rankSubmitBtn.textContent = '등록 중...';

            const { error } = await supabase
                .from('rankings')
                .insert([{ name: playerName, score: gold }]);

            if (error) {
                alert("등록 실패: " + error.message);
            } else {
                alert("랭킹이 등록되었습니다!");
                getRankings(); // 등록 직후 랭킹 리스트 리로드
            }
            rankSubmitBtn.disabled = false;
            rankSubmitBtn.textContent = '🏆 내 점수 랭킹 등록하기';
        });

        // BGM 켜고 끄기 토글
        function toggleBGM() {
            if (isMusicPlaying) {
                bgm.pause();
                bgmToggleBtn.textContent = '🔇 음악 꺼짐';
                isMusicPlaying = false;
            } else {
                bgm.play().then(() => {
                    bgmToggleBtn.textContent = '🔊 음악 켜짐';
                    isMusicPlaying = true;
                }).catch(() => {});
            }
        }

        bgmToggleBtn.addEventListener('click', toggleBGM);

        // 동전을 클릭했을 때 
        coinEl.addEventListener('click', (event) => {
            gold++;
            
            // 효과음 재생
            clickSound.currentTime = 0;
            clickSound.play();
            
            // +1 텍스트 생성
            createFloatingText(event.clientX, event.clientY);
            
            // 유저가 한 번 클릭하면 자동으로 BGM도 활성화
            if (!isMusicPlaying) toggleBGM();
            
            saveGame();
            updateDisplay();
        });

        // 마우스 클릭 위치에 +1 애니메이션 텍스트 소환
        function createFloatingText(x, y) {
            const text = document.createElement('div');
            text.classList.add('floating-text');
            text.textContent = '+1';
            text.style.left = `${x - 15}px`;
            text.style.top = `${y - 15}px`;
            document.body.appendChild(text);
            
            setTimeout(() => { text.remove(); }, 800);
        }

        // 광부 구매 버튼 이벤트
        upgradeBtn.addEventListener('click', () => {
            if (gold >= upgradeCost) {
                gold -= upgradeCost;
                autoMiners++;
                upgradeCost = Math.floor(upgradeCost * 1.5);
                saveGame();
                updateDisplay();
            }
        });

        // 내 로컬 세이브 데이터 초기화 버튼
        resetBtn.addEventListener('click', () => {
            if (confirm("정말로 내 로컬 데이터를 초기화하시겠습니까?\n(로컬 점수와 광부만 지워지며, 이미 등록한 서버 랭킹은 유지됩니다)")) {
                localStorage.clear();
                gold = 0;
                autoMiners = 0;
                upgradeCost = 10;
                updateDisplay();
            }
        });

        // 1초마다 자동 수급 시스템
        setInterval(() => {
            if (autoMiners > 0) {
                gold += autoMiners;
                saveGame();
                updateDisplay();
            }
        }, 1000);

        // 점수판 갱신
        function updateDisplay() {
            goldEl.textContent = gold.toLocaleString();
            upgradeBtn.textContent = `자동 광부 고용 (비용: ${upgradeCost} 골드) | 현재 광부: ${autoMiners}명`;
            upgradeBtn.disabled = gold < upgradeCost;
        }

        // 브라우저 켜질 때 세이브 데이터 불러오며 시작
        loadGame();
    </script>
</body>
</html>
